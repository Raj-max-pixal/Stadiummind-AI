name: stadiummind_ai
description: Production AI-powered stadium operations platform for live match operations
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Navigation
  go_router: ^14.1.0

  # HTTP & Networking
  dio: ^5.6.0
  web_socket_channel: ^2.4.0

  # Firebase
  firebase_core: ^3.4.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.2.0

  # Maps & Location
  google_maps_flutter: ^2.6.0
  geolocator: ^12.0.0

  # Speech & Audio
  speech_to_text: ^7.4.0
  flutter_tts: ^3.8.5

  # Charts & Visualization
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # Animations
  animations: ^2.0.11
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.3.10
  custom_lint: ^0.6.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
